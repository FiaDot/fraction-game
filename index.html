<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분수 마스터! 🎮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-y: auto;
}

.container {
  width: 90%;
  max-width: 800px;
  min-height: 80vh;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ───── 시작 화면 ───── */
.screen { display: none; }
.screen.active { display: block; }

#startScreen {
  text-align: center;
  animation: fadeIn 0.5s ease;
}

#startScreen h1 {
  font-size: 3rem;
  color: #fff;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
  margin-bottom: 10px;
}

#startScreen .subtitle {
  font-size: 1.2rem;
  color: #e0d4f7;
  margin-bottom: 30px;
}

#startScreen .emoji-row {
  font-size: 3rem;
  margin-bottom: 30px;
  animation: bounce 2s infinite;
}

.btn {
  display: inline-block;
  padding: 16px 48px;
  font-size: 1.4rem;
  font-weight: bold;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}

.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.98); }

.btn-start {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: #fff;
  box-shadow: 0 8px 25px rgba(240,147,251,0.4);
}

.btn-option {
  display: block;
  width: 100%;
  padding: 14px 20px;
  margin: 10px 0;
  font-size: 1.3rem;
  font-weight: bold;
  border: 3px solid #764ba2;
  border-radius: 16px;
  background: #f0e6ff;
  color: #333;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-option:hover {
  background: #d9c2f0;
  border-color: #5a3d8a;
  transform: translateX(5px);
}

.btn-option.correct {
  background: #27ae60 !important;
  border-color: #27ae60 !important;
  color: #fff !important;
  animation: popIn 0.3s ease;
}

.btn-option.wrong {
  background: #e74c3c !important;
  border-color: #e74c3c !important;
  color: #fff !important;
  animation: shake 0.4s ease;
}

/* ───── 게임 화면 ───── */
#gameScreen {
  animation: fadeIn 0.3s ease;
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  color: #fff;
}

.game-header .level {
  font-size: 1.1rem;
  background: rgba(255,255,255,0.2);
  padding: 6px 16px;
  border-radius: 20px;
}

.game-header .score {
  font-size: 1.1rem;
  font-weight: bold;
}

.game-header .progress {
  font-size: 0.95rem;
  opacity: 0.85;
}

.streak-badge {
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #333;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.9rem;
  font-weight: bold;
  display: none;
}

.streak-badge.show { display: inline-block; animation: popIn 0.3s ease; }

.game-card {
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 36px 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  min-height: 55vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.game-type-label {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
  margin-bottom: 16px;
  color: #fff;
}

.type-compare { background: #3498db; }
.type-calc { background: #e67e22; }
.type-equiv { background: #9b59b6; }

.question-text {
  font-size: 1.6rem;
  font-weight: bold;
  color: #333;
  text-align: center;
  margin-bottom: 20px;
}

.fraction-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.fraction-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.fraction-visual {
  width: 120px;
  height: 120px;
}

.fraction-text {
  font-size: 1.8rem;
  font-weight: bold;
  color: #333;
  text-align: center;
  line-height: 1.1;
}

.fraction-text .num { display: block; }
.fraction-text .bar { display: block; height: 3px; background: #333; margin: 2px 0; }
.fraction-text .den { display: block; }

.operator {
  font-size: 2.5rem;
  font-weight: bold;
  color: #e67e22;
}

.compare-buttons {
  display: flex;
  gap: 12px;
}

.btn-compare {
  width: 70px;
  height: 70px;
  font-size: 2rem;
  font-weight: bold;
  border: 3px solid #ddd;
  border-radius: 16px;
  background: #fff;
  color: #555;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-compare:hover {
  background: #667eea;
  color: #fff;
  border-color: #667eea;
  transform: scale(1.1);
}

.btn-compare.correct {
  background: #27ae60 !important;
  border-color: #27ae60 !important;
  color: #fff !important;
}

.btn-compare.wrong {
  background: #e74c3c !important;
  border-color: #e74c3c !important;
  color: #fff !important;
}

/* 연산 입력 */
.calc-input {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.calc-input span {
  font-size: 1.8rem;
  font-weight: bold;
  color: #333;
}

.calc-input-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.calc-input-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-spin {
  width: 40px;
  height: 40px;
  font-size: 1.4rem;
  font-weight: bold;
  border: 2px solid #764ba2;
  border-radius: 50%;
  background: #f0e6ff;
  color: #764ba2;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  line-height: 1;
  padding: 0;
}

.btn-spin:hover {
  background: #764ba2;
  color: #fff;
}

.btn-spin:active {
  transform: scale(0.9);
}

.calc-input input {
  width: 70px;
  height: 45px;
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  border: 3px solid #ddd;
  border-radius: 12px;
  outline: none;
  transition: border-color 0.2s;
  -moz-appearance: textfield;
}

.calc-input input::-webkit-outer-spin-button,
.calc-input input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.calc-input input:focus {
  border-color: #667eea;
}

.calc-input .bar-line {
  width: 100%;
  height: 3px;
  background: #333;
  margin: 4px 0;
}

.btn-submit {
  margin-top: 16px;
  padding: 12px 40px;
  font-size: 1.2rem;
  font-weight: bold;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-submit:hover { transform: scale(1.05); }

/* 피드백 */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  font-weight: bold;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  z-index: 100;
  pointer-events: none;
  animation: feedbackPop 0.8s ease forwards;
}

.feedback.correct-fb { color: #27ae60; }
.feedback.wrong-fb { color: #e74c3c; }

/* ───── 결과 화면 ───── */
#resultScreen {
  text-align: center;
  animation: fadeIn 0.5s ease;
  color: #fff;
}

#resultScreen h2 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.result-card {
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  padding: 30px;
  margin: 20px 0;
  color: #333;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.result-stat {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  font-size: 1.2rem;
  border-bottom: 1px solid #eee;
}

.result-stat:last-child { border-bottom: none; }
.result-stat .label { color: #777; }
.result-stat .value { font-weight: bold; color: #333; }

.result-grade {
  font-size: 4rem;
  margin: 20px 0;
}

.btn-restart {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: #fff;
  box-shadow: 0 8px 25px rgba(240,147,251,0.4);
}

/* ───── Confetti ───── */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  z-index: 200;
  pointer-events: none;
  animation: confettiFall linear forwards;
}

/* ───── 애니메이션 ───── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

@keyframes popIn {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
}

@keyframes feedbackPop {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
  100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
}

@keyframes confettiFall {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

/* 팡파레 이펙트 */
.fanfare-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 150;
}

.fanfare-star {
  position: fixed;
  font-size: 2rem;
  pointer-events: none;
  z-index: 151;
  animation: starBurst 0.8s ease-out forwards;
}

@keyframes starBurst {
  0% { opacity: 1; transform: scale(0) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.5) rotate(180deg); }
  100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
}

.fanfare-ring {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 20px;
  height: 20px;
  border: 4px solid #ffd200;
  border-radius: 50%;
  pointer-events: none;
  z-index: 150;
  animation: ringExpand 0.7s ease-out forwards;
}

@keyframes ringExpand {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(15); }
}

.screen-flash {
  position: fixed;
  inset: 0;
  background: rgba(255, 215, 0, 0.15);
  pointer-events: none;
  z-index: 140;
  animation: flashFade 0.4s ease-out forwards;
}

@keyframes flashFade {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

/* 태블릿 & PC (700px 이상) */
@media (min-width: 700px) {
  #startScreen h1 { font-size: 3.5rem; }
  #startScreen .subtitle { font-size: 1.5rem; }
  #startScreen .emoji-row { font-size: 3.5rem; }
  .btn-start, .btn-restart { font-size: 1.6rem; padding: 18px 56px; }
  .game-header .level, .game-header .score { font-size: 1.3rem; }
  .game-header .progress { font-size: 1.1rem; }
  .streak-badge { font-size: 1rem; padding: 5px 14px; }
  .game-type-label { font-size: 1rem; padding: 5px 16px; }
  .question-text { font-size: 2rem; margin-bottom: 20px; }
  .fraction-visual { width: 140px; height: 140px; }
  .fraction-text { font-size: 2.2rem; }
  .operator { font-size: 3rem; }
  .fraction-display { gap: 28px; margin-bottom: 24px; }
  .btn-compare { width: 80px; height: 80px; font-size: 2.4rem; border-radius: 18px; }
  .compare-buttons { gap: 18px; }
  .btn-option { font-size: 1.5rem; padding: 16px 22px; margin: 12px 0; border-radius: 18px; }
  .calc-input input { width: 85px; height: 52px; font-size: 1.8rem; border-radius: 14px; }
  .calc-input .bar-line { width: 100%; }
  .btn-spin { width: 48px; height: 48px; font-size: 1.6rem; }
  .btn-submit { font-size: 1.4rem; padding: 14px 46px; }
  .game-card { padding: 32px 28px; border-radius: 28px; }
  #resultScreen h2 { font-size: 3rem; }
  .result-grade { font-size: 4.5rem; }
  .result-stat { font-size: 1.4rem; padding: 14px 0; }
  .result-card { padding: 32px; border-radius: 28px; }
  .feedback { font-size: 3.5rem; }
}

/* iPad Air 4 가로 모드 (1180x820) — 높이가 짧으므로 조밀하게 */
@media (min-width: 700px) and (max-height: 900px) {
  .container { min-height: auto; padding: 16px 24px; }
  .game-card { min-height: auto; padding: 24px 28px; }
  #startScreen .emoji-row { margin-bottom: 16px; }
  #startScreen h1 { margin-bottom: 4px; }
  #startScreen .subtitle { margin-bottom: 16px; }
  .question-text { margin-bottom: 14px; }
  .fraction-visual { width: 110px; height: 110px; }
  .fraction-display { gap: 24px; margin-bottom: 18px; }
  .btn-compare { width: 70px; height: 70px; font-size: 2rem; }
  .btn-option { padding: 12px 20px; margin: 8px 0; }
  .result-grade { font-size: 3.5rem; margin: 12px 0; }
  .result-stat { padding: 10px 0; }
  .result-card { padding: 24px; margin: 14px 0; }
}

/* 작은 모바일 */
@media (max-width: 500px) {
  .container { width: 100%; padding: 16px; }
  #startScreen h1 { font-size: 2.2rem; }
  .fraction-visual { width: 90px; height: 90px; }
  .fraction-text { font-size: 1.4rem; }
  .operator { font-size: 2rem; }
  .question-text { font-size: 1.3rem; }
  .btn-compare { width: 60px; height: 60px; font-size: 1.6rem; }
  .game-card { padding: 20px 16px; min-height: 340px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- 시작 화면 -->
  <div id="startScreen" class="screen active">
    <div class="emoji-row">🍕 🧮 🎯</div>
    <h1>분수 마스터!</h1>
    <p class="subtitle">재미있게 분수를 배워보자!</p>
    <br>
    <button class="btn btn-start" onclick="startGame()">게임 시작!</button>
  </div>

  <!-- 게임 화면 -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <span class="level" id="levelDisplay">레벨 1</span>
      <span class="streak-badge" id="streakBadge">🔥 0 연속!</span>
      <span class="score" id="scoreDisplay">⭐ 0점</span>
    </div>
    <div class="game-header" style="justify-content:center;">
      <span class="progress" id="progressDisplay">문제 1 / 10</span>
    </div>
    <div class="game-card" id="gameCard"></div>
  </div>

  <!-- 결과 화면 -->
  <div id="resultScreen" class="screen">
    <h2>게임 끝! 🎉</h2>
    <div class="result-grade" id="resultGrade"></div>
    <div class="result-card">
      <div class="result-stat">
        <span class="label">총 점수</span>
        <span class="value" id="resultScore"></span>
      </div>
      <div class="result-stat">
        <span class="label">맞은 문제</span>
        <span class="value" id="resultCorrect"></span>
      </div>
      <div class="result-stat">
        <span class="label">정답률</span>
        <span class="value" id="resultRate"></span>
      </div>
      <div class="result-stat">
        <span class="label">최고 연속 정답</span>
        <span class="value" id="resultStreak"></span>
      </div>
    </div>
    <button class="btn btn-restart" onclick="startGame()">다시 하기!</button>
  </div>
</div>

<script>
// ───── 사운드 (Web Audio API) ─────
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, vol) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = vol || 0.15;
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function soundCorrect() {
  playTone(523, 0.12, 'sine', 0.18);       // C5
  setTimeout(() => playTone(659, 0.12, 'sine', 0.18), 80);  // E5
  setTimeout(() => playTone(784, 0.25, 'sine', 0.18), 160);  // G5
}

function soundWrong() {
  playTone(200, 0.15, 'sawtooth', 0.1);
  setTimeout(() => playTone(180, 0.25, 'sawtooth', 0.1), 120);
}

function soundClick() {
  playTone(880, 0.06, 'sine', 0.08);
}

function soundStart() {
  const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.18, 'sine', 0.15), i * 100);
  });
}

function soundStreak() {
  const notes = [784, 988, 1175, 1319]; // G5 B5 D6 E6
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.12, 'triangle', 0.12), i * 70);
  });
}

function soundLevelUp() {
  const notes = [523, 659, 784, 1047, 1319]; // C E G C6 E6
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.2, 'sine', 0.14), i * 120);
  });
}

function soundResult(good) {
  if (good) {
    // 팡파레
    const notes = [523, 523, 659, 784, 659, 784, 1047];
    const times = [0, 100, 200, 300, 500, 600, 700];
    const durs =  [0.1, 0.1, 0.1, 0.15, 0.1, 0.1, 0.4];
    notes.forEach((f, i) => {
      setTimeout(() => playTone(f, durs[i], 'sine', 0.16), times[i]);
    });
  } else {
    // 차분한 마무리
    playTone(392, 0.3, 'sine', 0.1);
    setTimeout(() => playTone(330, 0.4, 'sine', 0.1), 250);
  }
}

// ───── 게임 상태 ─────
let state = {};

function initState() {
  state = {
    score: 0,
    level: 1,
    questionNum: 0,
    totalQuestions: 10,
    correctCount: 0,
    streak: 0,
    maxStreak: 0,
    answered: false,
  };
}

// ───── 유틸 ─────
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function simplify(n, d) {
  if (d === 0) return [n, d];
  const g = gcd(Math.abs(n), Math.abs(d));
  return [n / g, d / g];
}

function fracValue(n, d) { return n / d; }

function randomFraction(maxDen) {
  const den = randInt(2, maxDen || 10);
  const num = randInt(1, den);
  return [num, den];
}

// ───── 파이차트 그리기 ─────
function drawPie(canvas, numerator, denominator, color) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;
  const r = Math.min(cx, cy) - 4;

  ctx.clearRect(0, 0, w, h);

  // 배경 원
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#eee';
  ctx.fill();
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 분수 부분
  if (numerator > 0) {
    const startAngle = -Math.PI / 2;
    const endAngle = startAngle + (Math.PI * 2 * numerator / denominator);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }

  // 분할선
  for (let i = 0; i < denominator; i++) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * i / denominator);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // 테두리
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ───── 화면 전환 ─────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ───── 게임 시작 ─────
function startGame() {
  initState();
  showScreen('gameScreen');
  updateHeader();
  soundStart();
  nextQuestion();
}

function updateHeader() {
  document.getElementById('levelDisplay').textContent = `레벨 ${state.level}`;
  document.getElementById('scoreDisplay').textContent = `⭐ ${state.score}점`;
  document.getElementById('progressDisplay').textContent = `문제 ${state.questionNum} / ${state.totalQuestions}`;

  const badge = document.getElementById('streakBadge');
  if (state.streak >= 2) {
    badge.textContent = `🔥 ${state.streak} 연속!`;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// ───── 문제 출제 ─────
function nextQuestion() {
  state.questionNum++;
  state.answered = false;

  if (state.questionNum > state.totalQuestions) {
    showResult();
    return;
  }

  // 레벨에 따라 난이도 조절
  state.level = Math.floor((state.questionNum - 1) / 10) + 1;

  updateHeader();

  const types = ['compare', 'calc', 'equiv'];
  const type = types[randInt(0, 2)];

  switch (type) {
    case 'compare': generateCompare(); break;
    case 'calc': generateCalc(); break;
    case 'equiv': generateEquiv(); break;
  }
}

// ───── 1. 크기 비교 ─────
function generateCompare() {
  const maxDen = 6 + state.level * 2;
  let [n1, d1] = randomFraction(maxDen);
  let [n2, d2] = randomFraction(maxDen);

  // 같은 분수가 되지 않도록 (가끔은 같게)
  if (Math.random() > 0.2 && n1 * d2 === n2 * d1) {
    d2 = d2 === 2 ? 3 : d2 - 1;
    n2 = Math.min(n2, d2);
  }

  const card = document.getElementById('gameCard');
  const isWide = window.innerWidth >= 700;
  const isShort = window.innerHeight <= 900;
  const size = window.innerWidth < 500 ? 90 : (isWide && isShort) ? 110 : isWide ? 140 : 120;

  card.innerHTML = `
    <span class="game-type-label type-compare">크기 비교</span>
    <p class="question-text">어느 분수가 더 클까?</p>
    <div class="fraction-display">
      <div class="fraction-box">
        <canvas class="fraction-visual" id="pie1" width="${size * 2}" height="${size * 2}" style="width:${size}px;height:${size}px;"></canvas>
        <div class="fraction-text"><span class="num">${n1}</span><span class="bar"></span><span class="den">${d1}</span></div>
      </div>
      <span class="operator">?</span>
      <div class="fraction-box">
        <canvas class="fraction-visual" id="pie2" width="${size * 2}" height="${size * 2}" style="width:${size}px;height:${size}px;"></canvas>
        <div class="fraction-text"><span class="num">${n2}</span><span class="bar"></span><span class="den">${d2}</span></div>
      </div>
    </div>
    <div class="compare-buttons">
      <button class="btn-compare" onclick="checkCompare('>', this)">&gt;</button>
      <button class="btn-compare" onclick="checkCompare('=', this)">=</button>
      <button class="btn-compare" onclick="checkCompare('<', this)">&lt;</button>
    </div>
  `;

  drawPie(document.getElementById('pie1'), n1, d1, '#3498db');
  drawPie(document.getElementById('pie2'), n2, d2, '#e74c3c');

  const v1 = fracValue(n1, d1);
  const v2 = fracValue(n2, d2);
  state.correctAnswer = v1 > v2 ? '>' : v1 < v2 ? '<' : '=';
}

function checkCompare(answer, btn) {
  if (state.answered) return;
  state.answered = true;

  soundClick();
  const isCorrect = answer === state.correctAnswer;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    document.querySelectorAll('.btn-compare').forEach(b => {
      if (b.textContent.trim() === state.correctAnswer ||
          (state.correctAnswer === '>' && b.textContent.trim() === '>') ||
          (state.correctAnswer === '<' && b.textContent.trim() === '<')) {
        // 정답 표시
      }
    });
  }

  handleAnswer(isCorrect);
}

// ───── 2. 분수 연산 ─────
function generateCalc() {
  const maxDen = 4 + state.level * 2;
  const ops = ['+', '-'];
  const op = ops[randInt(0, 1)];

  let [n1, d1] = randomFraction(maxDen);
  let [n2, d2] = randomFraction(maxDen);

  // 뺄셈일 때 결과가 양수가 되도록
  if (op === '-' && fracValue(n1, d1) < fracValue(n2, d2)) {
    [n1, d1, n2, d2] = [n2, d2, n1, d1];
  }

  // 정답 계산
  let ansNum, ansDen;
  if (op === '+') {
    ansNum = n1 * d2 + n2 * d1;
    ansDen = d1 * d2;
  } else {
    ansNum = n1 * d2 - n2 * d1;
    ansDen = d1 * d2;
  }
  [ansNum, ansDen] = simplify(ansNum, ansDen);

  state.correctAnswer = { num: ansNum, den: ansDen };

  const card = document.getElementById('gameCard');
  const isWide = window.innerWidth >= 700;
  const isShort = window.innerHeight <= 900;
  const size = window.innerWidth < 500 ? 90 : (isWide && isShort) ? 110 : isWide ? 140 : 120;

  card.innerHTML = `
    <span class="game-type-label type-calc">분수 계산</span>
    <p class="question-text">계산해 보세요!</p>
    <div class="fraction-display">
      <div class="fraction-box">
        <canvas class="fraction-visual" id="pie1" width="${size * 2}" height="${size * 2}" style="width:${size}px;height:${size}px;"></canvas>
        <div class="fraction-text"><span class="num">${n1}</span><span class="bar"></span><span class="den">${d1}</span></div>
      </div>
      <span class="operator">${op}</span>
      <div class="fraction-box">
        <canvas class="fraction-visual" id="pie2" width="${size * 2}" height="${size * 2}" style="width:${size}px;height:${size}px;"></canvas>
        <div class="fraction-text"><span class="num">${n2}</span><span class="bar"></span><span class="den">${d2}</span></div>
      </div>
      <span class="operator">=</span>
    </div>
    <div class="calc-input">
      <div class="calc-input-box">
        <div class="calc-input-row">
          <button class="btn-spin" onclick="spinValue('ansNum', -1)">−</button>
          <input type="number" id="ansNum" value="1" min="0" max="99">
          <button class="btn-spin" onclick="spinValue('ansNum', 1)">+</button>
        </div>
        <div class="bar-line"></div>
        <div class="calc-input-row">
          <button class="btn-spin" onclick="spinValue('ansDen', -1)">−</button>
          <input type="number" id="ansDen" value="2" min="1" max="99">
          <button class="btn-spin" onclick="spinValue('ansDen', 1)">+</button>
        </div>
      </div>
    </div>
    <button class="btn-submit" onclick="checkCalc()">확인!</button>
    <p style="color:#aaa; font-size:0.85rem; margin-top:8px;">기약분수로 답해주세요</p>
  `;

  drawPie(document.getElementById('pie1'), n1, d1, '#e67e22');
  drawPie(document.getElementById('pie2'), n2, d2, '#2ecc71');

  // Enter 키로 제출
  document.getElementById('ansNum').addEventListener('keyup', e => { if (e.key === 'Enter') checkCalc(); });
  document.getElementById('ansDen').addEventListener('keyup', e => { if (e.key === 'Enter') checkCalc(); });
  document.getElementById('ansNum').focus();
}

function spinValue(id, delta) {
  if (state.answered) return;
  const input = document.getElementById(id);
  const min = id === 'ansDen' ? 1 : 0;
  let val = parseInt(input.value) || min;
  val = Math.max(min, Math.min(99, val + delta));
  input.value = val;
  soundClick();
}

function checkCalc() {
  if (state.answered) return;

  const numInput = parseInt(document.getElementById('ansNum').value);
  const denInput = parseInt(document.getElementById('ansDen').value);

  if (isNaN(numInput) || isNaN(denInput) || denInput === 0) return;

  state.answered = true;
  soundClick();

  const [sNum, sDen] = simplify(numInput, denInput);
  const isCorrect = sNum === state.correctAnswer.num && sDen === state.correctAnswer.den;

  if (!isCorrect) {
    const hint = document.createElement('p');
    hint.style.cssText = 'color:#e74c3c; font-weight:bold; font-size:1.2rem; margin-top:10px;';
    hint.textContent = `정답: ${state.correctAnswer.num}/${state.correctAnswer.den}`;
    document.getElementById('gameCard').appendChild(hint);
  }

  handleAnswer(isCorrect);
}

// ───── 3. 동치 분수 ─────
function generateEquiv() {
  const maxDen = 6 + state.level;
  const [n, d] = randomFraction(maxDen);
  const mult = randInt(2, 4);
  const equivN = n * mult;
  const equivD = d * mult;

  // 오답 보기 생성
  const choices = [{ n: equivN, d: equivD, correct: true }];

  while (choices.length < 4) {
    const fakeN = randInt(1, 12);
    const fakeD = randInt(2, 12);
    const [sfn, sfd] = simplify(fakeN, fakeD);
    const [sn, sd] = simplify(n, d);

    if (sfn === sn && sfd === sd) continue;
    if (choices.some(c => c.n === fakeN && c.d === fakeD)) continue;

    choices.push({ n: fakeN, d: fakeD, correct: false });
  }

  // 섞기
  for (let i = choices.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }

  const card = document.getElementById('gameCard');
  const isWide = window.innerWidth >= 700;
  const isShort = window.innerHeight <= 900;
  const size = window.innerWidth < 500 ? 90 : (isWide && isShort) ? 110 : isWide ? 140 : 120;

  card.innerHTML = `
    <span class="game-type-label type-equiv">동치 분수</span>
    <p class="question-text">같은 크기의 분수를 찾으세요!</p>
    <div class="fraction-display" style="margin-bottom:16px;">
      <div class="fraction-box">
        <canvas class="fraction-visual" id="pie1" width="${size * 2}" height="${size * 2}" style="width:${size}px;height:${size}px;"></canvas>
        <div class="fraction-text" style="font-size:2.2rem;"><span class="num">${n}</span><span class="bar"></span><span class="den">${d}</span></div>
      </div>
    </div>
    <div id="equivChoices" style="width:100%;">
      ${choices.map((c, i) => `
        <button class="btn-option" data-correct="${c.correct}" onclick="checkEquiv(this)">
          ${c.n} / ${c.d}
        </button>
      `).join('')}
    </div>
  `;

  drawPie(document.getElementById('pie1'), n, d, '#9b59b6');
}

function checkEquiv(btn) {
  if (state.answered) return;
  state.answered = true;
  soundClick();

  const isCorrect = btn.dataset.correct === 'true';
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    document.querySelectorAll('.btn-option[data-correct="true"]').forEach(b => {
      b.classList.add('correct');
    });
  }

  handleAnswer(isCorrect);
}

// ───── 정답 처리 ─────
function handleAnswer(isCorrect) {
  if (isCorrect) {
    const bonus = state.streak >= 2 ? 5 : 0;
    state.score += 10 + bonus;
    state.correctCount++;
    state.streak++;
    state.maxStreak = Math.max(state.maxStreak, state.streak);
    showFeedback(true);
    spawnFanfare();
    spawnConfetti();
    if (state.streak >= 3) {
      soundStreak();
    } else {
      soundCorrect();
    }
  } else {
    state.streak = 0;
    showFeedback(false);
    soundWrong();
  }

  updateHeader();
  setTimeout(nextQuestion, 1200);
}

function showFeedback(isCorrect) {
  const messages = isCorrect
    ? ['잘했어! 👏', '정답! 🎉', '천재! ⭐', '대단해! 💪', '최고! 🏆']
    : ['아쉽다! 😅', '다음엔 맞추자! 💪', '괜찮아! 😊', '힘내! 🌟'];

  const el = document.createElement('div');
  el.className = `feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  el.textContent = messages[randInt(0, messages.length - 1)];
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ───── 팡파레 이펙트 ─────
function spawnFanfare() {
  // 화면 플래시
  const flash = document.createElement('div');
  flash.className = 'screen-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  // 확장 링
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const ring = document.createElement('div');
      ring.className = 'fanfare-ring';
      ring.style.borderColor = ['#ffd200', '#f093fb', '#3498db'][i];
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 700);
    }, i * 150);
  }

  // 별/이모지 터짐
  const emojis = ['⭐', '🌟', '✨', '💫', '🎉', '🎊', '💥', '🔥'];
  for (let i = 0; i < 12; i++) {
    const star = document.createElement('div');
    star.className = 'fanfare-star';
    star.textContent = emojis[randInt(0, emojis.length - 1)];
    const angle = (Math.PI * 2 * i) / 12;
    const dist = randInt(80, 200);
    const x = window.innerWidth / 2 + Math.cos(angle) * dist;
    const y = window.innerHeight / 2 + Math.sin(angle) * dist;
    star.style.left = x + 'px';
    star.style.top = y + 'px';
    star.style.fontSize = randInt(20, 40) + 'px';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 800);
  }
}

// ───── Confetti ─────
function spawnConfetti() {
  const colors = ['#f093fb', '#f5576c', '#ffd200', '#3498db', '#2ecc71', '#9b59b6'];
  for (let i = 0; i < 25; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = randInt(10, 90) + 'vw';
    piece.style.top = '-10px';
    piece.style.background = colors[randInt(0, colors.length - 1)];
    piece.style.width = randInt(6, 12) + 'px';
    piece.style.height = randInt(6, 12) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.transform = `rotate(${randInt(0, 360)}deg)`;

    const duration = randInt(800, 1500);
    const endX = randInt(-100, 100);
    piece.style.animation = `confettiFall ${duration}ms ease forwards`;
    piece.animate([
      { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 1 },
      { transform: `translateY(${randInt(300, 600)}px) translateX(${endX}px) rotate(${randInt(180, 720)}deg)`, opacity: 0 }
    ], { duration, easing: 'ease-out', fill: 'forwards' });

    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), duration);
  }
}

// ───── 결과 화면 ─────
function showResult() {
  showScreen('resultScreen');

  const rate = Math.round((state.correctCount / state.totalQuestions) * 100);
  soundResult(rate >= 70);

  document.getElementById('resultScore').textContent = `${state.score}점`;
  document.getElementById('resultCorrect').textContent = `${state.correctCount} / ${state.totalQuestions}`;
  document.getElementById('resultRate').textContent = `${rate}%`;
  document.getElementById('resultStreak').textContent = `${state.maxStreak}회 연속`;

  let grade;
  if (rate >= 90) grade = '🏆 분수 천재!';
  else if (rate >= 70) grade = '⭐ 잘했어!';
  else if (rate >= 50) grade = '💪 조금만 더!';
  else grade = '📚 연습하자!';

  document.getElementById('resultGrade').textContent = grade;

  // 결과 화면 confetti
  if (rate >= 70) {
    for (let i = 0; i < 3; i++) {
      setTimeout(spawnConfetti, i * 300);
    }
  }
}
</script>
